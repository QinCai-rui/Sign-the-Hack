# Sign the Hack main config
# All messages support MiniMessage, and PlaceholderAPI placeholders if PAPI is installed.

debug: false
locale: en

probe:
  # Max checks packed in one probe sign (1-3 recommended)
  max-checks-per-sign: 3
  # Delay between sequential probe signs in ticks
  delay-between-signs-ticks: 5
  # Client response timeout in ticks. Timeout is classified as PROTECTED.
  timeout-ticks: 100
  # Hide probe signs/barriers from player view using client-side fake blocks.
  invisible-signs: true

check-sets:
  # Used by /signthehack <player>
  manual-default:
    - meteor-client
    - liquidbounce
    - freecam
    - wurst
    - xray-fabric
    - chestesp
    - killaura-fabric
    - autofish
    - lumina
    - autoswitch
    - bleachhack
    - aristois
    - coffee
    - world-downloader
    - autoclicker-fabric
    - antiafk
    - auto-clicker-mc
    - extra-autoclicker-1
    - extra-autoclicker-2
  # Used by automatic join scan
  join:
    - meteor-client
    - freecam
    - wurst
    - chestesp
    - lumina
    - autoswitch
    - bleachhack
    - aristois
    - coffee
    - world-downloader
    - antiafk
  # Used when anticheat-trigger scan occurs
  anticheat:
    - killaura-fabric
    - autoclicker-fabric
    - auto-clicker-mc
    - liquidbounce

auto:
  join:
    enabled: true
    delay-ticks: 20
    first-join-only: false

cooldown:
  manual-seconds: 15
  join-seconds: 30
  anticheat-seconds: 60

bedrock-skip:
  enabled: true
  prefixes:
    - "."
    - "*"

actions:
  # Commands run by console when any DETECTED result exists.
  on-detected:
    - "tempban <name> 30sec Unfair client/mod detected: <results>"
  # Commands run by console when no DETECTED but any PROTECTED exists.
  on-protected:
    - "kick <name> Please disable translation/keybind protection mods. However, this might be also due to server/client lag if you do not know what this means"
  # Commands run by console when scan is clean (NOT_DETECTED/SKIPPED only).
  on-clean:
    - ""
  # Reason shown to player when action hooks execute.
  # Must include exact check id|display name|status in <results>.
  reason-template: "<red>Sign the Hack action triggered.</red> <gray>Checks:</gray> <white><results></white>"

webhook:
  enabled: false
  url: ""
  timeout-millis: 3000
  max-retries: 3
  base-backoff-millis: 700
  payload-template: '{"content":"Sign the Hack | &name& checked by &checker& (&reason&) | hacks=&hacks& | results=&results&"}'

sqlite:
  # File path under plugin data folder
  file: signthehack.db
