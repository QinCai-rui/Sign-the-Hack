name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Stamp build version
        id: version
        shell: bash
        run: |
          DATE="$(date -u +%Y%m%d)"
          git fetch --tags --force
          LAST_SEQ="$(git tag --list "${DATE}.*" | sed -E "s/^${DATE}\.([0-9]+).*$/\1/" | sort -n | tail -1)"

          if [[ -z "${LAST_SEQ}" ]]; then
            NEXT_SEQ=1
          else
            NEXT_SEQ=$((LAST_SEQ + 1))
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="${DATE}.${NEXT_SEQ}-SNAPSHOT-${SHORT_SHA}"

          mvn -B -ntp versions:set -DnewVersion="${VERSION}" -DgenerateBackupPoms=false

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Build version: ${VERSION}"

      - name: Build and test
        run: mvn -B -ntp test
